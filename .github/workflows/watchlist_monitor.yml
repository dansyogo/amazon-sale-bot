name: "② 速報検知 (15〜30分ごと)"

# ── スケジュール ──────────────────────────────────────────────────────────────
# 15分・45分 の2回/時間 ≒ 30分間隔
# JST 7:00〜24:00 に限定するため UTC 22〜15 時のみ実行
on:
  schedule:
    # UTC  0〜15 時 の :15 と :45
    - cron: "15 0-15 * * *"
    - cron: "45 0-15 * * *"
    # UTC 22〜23 時 の :15 と :45
    - cron: "15 22-23 * * *"
    - cron: "45 22-23 * * *"

  workflow_dispatch:

# 同時実行を直列化（キャッシュ競合防止）
concurrency:
  group: watchlist-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchlist monitor
        env:
          AMAZON_ACCESS_KEY:      ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY:      ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_PARTNER_TAG:     ${{ secrets.AMAZON_PARTNER_TAG }}
          CLAUDE_API_KEY:         ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/watchlist_monitor.py

      - name: Commit updated cache and log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/watchlist_cache.json data/posted_log.json
          git diff --cached --quiet && echo "No changes." && exit 0

          git commit -m "chore: update watchlist_cache / posted_log [skip ci]"
          git pull --rebase origin main
          git push origin main
